# Production : Postgres + API + front (nginx)
# Prérequis : .env.prod à la racine avec notamment DATABASE_URL=postgresql://USER:PASS@db:5432/DB
# (aligné sur POSTGRES_USER / POSTGRES_PASSWORD / POSTGRES_DB du service db ci-dessous)

services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: qhse
      POSTGRES_PASSWORD: qhse_change_me
      POSTGRES_DB: qhse
    volumes:
      - qhse_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U qhse -d qhse']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env.prod
    depends_on:
      db:
        condition: service_healthy
    entrypoint: ['/bin/sh', '-c']
    command: "npx prisma migrate deploy && exec node src/server.js"
    expose:
      - '3001'

  front:
    build:
      context: .
      dockerfile: Dockerfile.front
    restart: always
    ports:
      - '80:80'
    depends_on:
      - api

volumes:
  qhse_pgdata:
