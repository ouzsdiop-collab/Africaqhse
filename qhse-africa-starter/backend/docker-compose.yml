# PostgreSQL local — Docker Desktop (https://docker.com/products/docker-desktop).
# Depuis ce dossier :
#   docker compose up -d
# Puis (une fois le conteneur prêt) :
#   npx prisma migrate deploy
#   npm run db:seed

services:
  db:
    image: postgres:16-alpine
    container_name: qhse_africa_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: qhse_africa
    ports:
      - '5432:5432'
    volumes:
      - qhse_pgdata:/var/lib/postgresql/data

volumes:
  qhse_pgdata:
